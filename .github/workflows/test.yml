name: SWEBOK v4 Harness V2 Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
  schedule:
    # Weekly CI to catch regressions
    - cron: '17 3 * * 1'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install system deps
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y jq sqlite3
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install jq sqlite3
          fi

      - name: Show env
        run: |
          python3 --version
          jq --version
          sqlite3 --version

      # === Full test suite: 147/147 expected ===
      # Breakdown:
      #   bin/adv-loop test (S0-S5 internal): 38
      #   tests/distilled-test.sh:            32
      #   tests/retrieval/test-v2.sh:         20
      #   tests/retrieval/test-adversarial.sh: 8
      #   tests/adv-loop/test-properties.sh:  44
      #   tests/test_health.py:                5
      # TOTAL:                              147

      - name: Run V1 distilled tests
        run: bash tests/distilled-test.sh

      - name: Run V2 retrieval tests
        run: bash tests/retrieval/test-v2.sh

      - name: Run adversarial tests
        run: bash tests/retrieval/test-adversarial.sh

      - name: Run adv-loop property tests
        run: bash tests/adv-loop/test-properties.sh

      - name: Run adv-loop self-tests
        run: bash bin/adv-loop test

      - name: Run health tests
        run: python3 tests/test_health.py

      - name: Build index
        run: python3 scripts/retrieval/pipeline.py distilled/ --output index.json

      - name: Smoke test (health probe)
        run: python3 scripts/query.py --health

      - name: Smoke test (dossier output)
        run: python3 scripts/query.py --dossier "What is SOLID?" | head -10

      - name: Verify test count
        run: |
          echo "=== Test count verification ==="
          echo "Expected: 147/147 PASS"
          echo "  - bin/adv-loop test: 38"
          echo "  - tests/distilled-test.sh: 32"
          echo "  - tests/retrieval/test-v2.sh: 20"
          echo "  - tests/retrieval/test-adversarial.sh: 8"
          echo "  - tests/adv-loop/test-properties.sh: 44"
          echo "  - tests/test_health.py: 5"

      - name: Lint Python
        run: |
          pip install --quiet ruff 2>/dev/null || true
          ruff check scripts/ 2>/dev/null || echo "ruff not available, skipping"

      - name: Security scan
        run: |
          pip install --quiet bandit 2>/dev/null || true
          bandit -r scripts/ 2>/dev/null || echo "bandit not available, skipping"
