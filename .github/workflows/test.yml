name: SWEBOK v4 Harness V2 Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
  schedule:
    # Weekly CI to catch regressions
    - cron: '17 3 * * 1'

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install system deps
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y jq sqlite3
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            brew install jq sqlite3
          fi

      - name: Show env
        run: |
          python3 --version
          jq --version
          sqlite3 --version

      - name: Run V1 distilled tests
        run: bash tests/distilled-test.sh

      - name: Run V2 retrieval tests
        run: bash tests/retrieval/test-v2.sh

      - name: Build index
        run: python3 scripts/retrieval/pipeline.py distilled/ --output index.json

      - name: Smoke test (--health probe)
        run: python3 scripts/query.py --health

      - name: Smoke test (--dossier output)
        run: python3 scripts/query.py --dossier "What is SOLID?" | head -10

      - name: Lint Python (if ruff available)
        run: |
          pip install --quiet ruff 2>/dev/null || true
          ruff check scripts/ 2>/dev/null || echo "ruff not available, skipping"

      - name: Security scan (if bandit available)
        run: |
          pip install --quiet bandit 2>/dev/null || true
          bandit -r scripts/ 2>/dev/null || echo "bandit not available, skipping"
