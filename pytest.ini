[pytest]
# Pytest configuration for the SWEBOK v4 harness test suite.
#
# Coverage gate (Council #10 QA MED-1): the bash test suites
# (distilled-test.sh, test-v2.sh, test-adversarial.sh, test-properties.sh,
# adv-loop test) exercise bash_scanner, dsl_engine, auto_trigger, and
# lib/adv-loop/* — but those don't show up in pytest's coverage report
# (the bash tests don't import Python). The pytest suite focuses on the
# state_engine cluster and CLI surface.
#
# The state_engine cluster coverage (state_engine + state_engine_*)
# is ~50% on average. The lower gate of 20% reflects that we have
# two test infrastructures (bash + pytest) covering different modules,
# and aggregating them would require a more complex coverage setup.
#
# Roadmap: bump to 30%, then 50%, as the pytest suite grows.
# See tests/test_state_engine_cli.py for new coverage work.
addopts =
    -ra
    --strict-markers
    --tb=short
    --cov=lib
    --cov-report=term-missing
    --cov-fail-under=20

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers (extensible)
markers =
    integration: integration tests that exercise the CLI subprocess
    unit: pure-Python unit tests
    regression: regression tests for previously-found bugs

# Suppress noisy deprecations from third-party deps
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

