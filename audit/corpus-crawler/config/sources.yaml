  # --- IETF / W3C / OMG (toujours libre) ----------------------------
  - name: ietf-rfcs
    kind: standards
    license: "IETF Trust / public domain"
    entries:
      # rfc-editor.org serves the canonical RFC text directly at
      # /rfc/rfcN.txt. datatracker.ietf.org wraps it in a JS-rendered
      # Vue app whose static HTML does not contain the RFC body, so it
      # is unreliable for a non-JS crawler. We use rfc-editor.org
      # .txt instead. (rfc-editor.org blocks HEAD for non-browser UAs
      # but allows GET, which the fetcher uses.)
      - id: rfc-7231
        title: "HTTP/1.1 Semantics and Content (RFC 7231)"
        url: https://www.rfc-editor.org/rfc/rfc7231.txt
        format: txt
        phase: [P5, P7]
      - id: rfc-7807
        title: "Problem Details for HTTP APIs (RFC 7807)"
