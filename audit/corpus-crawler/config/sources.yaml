  - pages.cs.wisc.edu
  - sarabander.github.io       # SICP community HTML mirror
  - www.csc.lsu.edu            # Peter Chen's papers page (LSU)
  - learning.oreilly.com       # the public landing pages for free sample chapters only
  - media.pragprog.com         # Pragmatic Bookshelf free chapters (publisher-released)
  - pragprog.com               # Pragmatic Bookshelf catalogue (HTML pages)
  - sre.google                 # Google SRE book / workbook (free online)
  - lawsofux.com               # Laws of UX (free online)
  - 12factor.net               # The Twelve-Factor App
  - martinfowler.com           # Martin Fowler's bliki (open articles)

  # Online / open access
  - archive.org                # Internet Archive borrow
  - openlibrary.org
  - www.gutenberg.org
