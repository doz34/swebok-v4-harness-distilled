# corpus-crawler — sources whitelist
# ===================================
# Only domains listed here are allowed as download origins.
# Anything not on this list is rejected by the crawler, even on HTTP 200.
#
# License: every entry MUST be either:
#   - public domain (US Gov, IEEE SWEBOK excerpts marked as such)
#   - explicit Creative Commons (CC BY, CC BY-SA, CC BY-NC, CC BY-NC-SA, CC0)
#   - official free distribution by the author/publisher (sample chapters,
#     free books, open-access editions)
#   - Internet Archive borrow (lending, 14-day window, signed-in user)
#
# NOT allowed: random "PDF download" sites, libgen mirrors, Sci-Hub,
# z-library, torrent indexes, .onion endpoints, anything behind a
# paywall that the user has not legitimately unlocked.

version: 2
generated: 2026-06-09
last_validated: 2026-06-09

# Global rate-limit policy. The crawler enforces these per-host.
policy:
  user_agent: "swebok-corpus-crawler/1.0 (research, non-commercial; contact: local@home.doz)"
  min_delay_seconds: 1.5        # polite floor between requests to the same host
  max_concurrent_per_host: 2
  max_file_size_mb: 80          # reject >80MB unless entry overrides
  request_timeout_seconds: 60
  respect_robots_txt: true
  max_retries: 3
  retry_backoff_base: 2.0       # exponential backoff: 2s, 4s, 8s
  content_type_strict: true     # reject mismatches (e.g., HTML for .pdf URL)

# Whitelisted domains. The crawler resolves URLs only against these.
allowed_hosts:
  # Standards bodies (public-domain or open-license)
  - nvlpubs.nist.gov
  - csrc.nist.gov
  - www.nist.gov
  - pages.nist.gov
  - owasp.org
  - www.owasp.org
  - github.com
  - raw.githubusercontent.com
  - api.github.com
  - specs.opencontainers.org
  - datatracker.ietf.org
  - www.rfc-editor.org
  - rfc-editor.org
  - www.w3.org
  - www.omg.org
  - www.itu.int
  - safecode.org
  - cloudsecurityalliance.org
  - www.enisa.europa.eu
  - www.iso.org
  - standards.ieee.org
  - www.computer.org
  - ieeexplore.ieee.org

  # Open educational / textbook mirrors (CC or author-released)
  - web.stanford.edu
  - stanford.edu
  - nlp.stanford.edu
  - www.greenteapress.com
  - greenteapress.com
  - linuxcommand.org
  - mml-book.github.io
  - www.mmds.org
  - mmds.org
  - infolab.stanford.edu
  - cs229.stanford.edu
  - cs231n.github.io
  - incompleteideas.net
  - inference.org.uk
  - www.inference.org.uk
  - inference.com
  - linear.axler.net
  - d2l.ai
  - www.deeplearningbook.org
  - algs4.cs.princeton.edu
  - mitpress.mit.edu
  - ocw.mit.edu
  - www.press.uchicago.edu
