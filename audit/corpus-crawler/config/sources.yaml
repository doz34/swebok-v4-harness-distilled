  - name: open-library-metadata
    description: |
      Open Library bibliographic metadata + cover art. Pure public API,
      no auth. Used to enrich the index with citation-grade metadata.
    script: scripts/openlibrary_meta.py
    endpoint: https://openlibrary.org/api/books

  - name: project-gutenberg
    description: |
      Project Gutenberg public-domain catalog. Useful for very old
      foundational texts (Weinberg pre-1990, Turing, classical CS) and
      for 19th-c. logic/philosophy works cited by software engineering
      writing. Most modern SE books are NOT in PG.
    script: scripts/gutenberg_fetch.py
    endpoint: https://www.gutenberg.org/ebooks/search/

# ---------------------------------------------------------------------------
# Ingestion pour livres de l'ACQUISITION_MANIFEST.md — chapitre gratuit
# officiel quand l'éditeur le met à disposition. La politique est : ne
# jamais scraper la page payante, ne jamais bypasser un paywall. Si
# l'éditeur ne fournit pas un PDF libre, on saute l'entrée.
# ---------------------------------------------------------------------------
manifest_grab:
  description: |
    Reads audit/corpus-references/ACQUISITION_MANIFEST.md and, for every
    entry that has a "Free chapter" or "Sample" link, downloads ONLY that
    free chapter (typically 10-30 pages). The full book is never
    requested.
  script: scripts/manifest_grab.py
  manifest: ../corpus-references/ACQUISITION_MANIFEST.md
  output_dir: downloads/manifest-chapters/
