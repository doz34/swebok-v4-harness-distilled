spec:
  name: antidrift-auto-trigger
  type: feature
  priority: critical
  scope: full
  effort_hours: 9.5
  sprint: v2-S2

description:
  as_a: maintainer of any project using SWEBOK v4 harness
  i_want: the harness to auto-trigger on every user prompt and feature evolution
  so_that: the project cannot drift silently — every step is auto-challenged by an adversarial dimension

user_stories:
  - id: US-1
    title: Intent Detection on User Prompt
    as_a: maintainer opening a Claude Code session
    i_want: harness detects my first prompt's intent and assigns the right phase
    so_that: correct patterns load without manual "use P5" command
  - id: US-2
    title: Adversarial Gate on Phase Change
    as_a: maintainer in mid-project
    i_want: adversarial-gate fires automatically when phase changes
    so_that: 4-judge Council validates transitions, preventing silent drift
  - id: US-3
    title: Council Auto-Fire Every N Edits
    as_a: maintainer making edits
    i_want: full Council (4 LLM-judges) fires automatically every 5 non-trivial edits
    so_that: adversarial dimension stays high without me triggering it manually
  - id: US-4
    title: Mini-Council Per Edit (Cheap Adversarial)
    as_a: maintainer editing
    i_want: mini-council (1 Haiku judge) runs on each non-trivial edit
    so_that: semantic drift is caught in real-time, not at next review
  - id: US-5
    title: Kill-Switch Safety Net
    as_a: maintainer seeing too much noise
    i_want: global disable via HARNESS_AUTO_TRIGGER=0
    so_that: I can work uninterrupted if anti-drift becomes too noisy

requirements:
  functional:
    - id: FR-1
      text: UserPromptSubmit hook fires on every user prompt
      priority: P0
    - id: FR-2
      text: intent.confidence >= 0.5 triggers state DB write, < 0.5 = no-op
      priority: P0
    - id: FR-3
      text: phase-guard.sh detects phase diff and emits <MULTIAGENT_LAUNCH>
      priority: P0
    - id: FR-4
      text: adversarial-gate fires Council 4-judges (ciso/qa-lead/architect/devops-lead)
      priority: P0
    - id: FR-5
      text: post-tool-use/auto-verify.sh increments edits_since_council on non-whitelist edits
      priority: P0
    - id: FR-6
      text: edits_since_council >= 5 AND cooldown 1h satisfied → fire full Council
      priority: P0
    - id: FR-7
      text: post-tool-use/auto-verify.sh calls mini_council per non-whitelist edit
      priority: P0
    - id: FR-8
      text: mini_council uses Haiku 4.5, returns DSL mini_council:finding=OK|VULN:<sev>;;
      priority: P0
    - id: FR-9
      text: whitelist: skip *.md, *.json, tests/*
      priority: P0
    - id: FR-10
      text: 1+ finding in 3 consecutive edits → escalate to full Council (override cooldown)
      priority: P1
    - id: FR-11
      text: HARNESS_AUTO_TRIGGER=0 env var disables FR-1, FR-3, FR-5, FR-7
      priority: P0
    - id: FR-12
      text: state DB keys: intent.phase, intent.confidence, intent.timestamp, edits_since_council, council.last_at, phase_history[]
      priority: P0
    - id: FR-13
      text: phase_history[] FIFO max 10 entries
      priority: P1
    - id: FR-14
      text: clear steering DB does NOT touch intent.* keys
      priority: P0
    - id: FR-15
      text: settings.json + template add UserPromptSubmit matcher
      priority: P0
    - id: FR-16
      text: bin/adv-loop auto-trigger <prompt> CLI
      priority: P1
    - id: FR-17
      text: bin/adv-loop council-status shows counter + last_at
      priority: P1
    - id: FR-18
      text: all hooks fail-open (exit 0 on internal error)
      priority: P0

  non_functional:
    performance:
      - id: NFR-P1
        text: UserPromptSubmit latency < 50ms p50, < 100ms p95, < 500ms p99
      - id: NFR-P2
        text: mini-council < 2s p95
      - id: NFR-P3
        text: full Council < 30s p95
      - id: NFR-P4
        text: cache hit rate > 80% on repeated prompts
    security:
      - id: NFR-S1
        text: hooks read no secrets
      - id: NFR-S2
        text: state DB writes atomic (SQLite WAL)
      - id: NFR-S3
        text: phase diff uses signed state keys
      - id: NFR-S4
        text: no modification of ~/.claude/settings.json
    reliability:
      - id: NFR-R1
        text: 100% hooks fail-open on internal error
      - id: NFR-R2
        text: 100% state DB reads tolerate missing keys
      - id: NFR-R3
        text: steering DB TTL 90 days
    maintainability:
      - id: NFR-M1
        text: new code follows lib/adv-loop/ pattern (stdlib only)
      - id: NFR-M2
        text: DSL output uses ;; delimiter
      - id: NFR-M3
        text: hooks read stdin JSON with positional args fallback
      - id: NFR-M4
        text: 1+ test per FR
      - id: NFR-M5
        text: env vars documented in CLAUDE.md
    usability:
      - id: NFR-U1
        text: bin/adv-loop help lists all subcommands
      - id: NFR-U2
        text: council-status output human-readable
      - id: NFR-U3
        text: phase change fires [PHASE-CHANGE] log line

dependencies:
  - lib/state_engine.py
  - lib/adv-loop/council.py
  - lib/adv-loop/feedback.py
  - lib/adv-loop/steering.py
  - lib/dsl_engine.py
  - intent-detector.py
  - pre-tool-use/phase-guard.sh
  - post-tool-use/auto-verify.sh
  - adversarial-gate.sh
  - bin/adv-loop
  - .swebok_state.db
  - settings.json
  - pytest 7+

out_of_scope:
  - id: OOS-1
    text: token counter adaptatif 3-niveaux
  - id: OOS-2
    text: 3 Councils formalisés
  - id: OOS-3
    text: GitHub publish v2
  - id: OOS-4
    text: skills mapping 50+ skills to phases
  - id: OOS-5
    text: v1.5.x doc updates
  - id: OOS-6
    text: pre-commit auto-install (G2 quick win)
  - id: OOS-7
    text: refonte P0-P10 vers P0-P11

success_metrics:
  - id: SM-1
    text: bin/adv-loop test reports 45/45 PASS (20 existing + 25 new)
  - id: SM-2
    text: user prompt to phase assignment < 100ms p95
  - id: SM-3
    text: phase change to Council fire < 5s p95
  - id: SM-4
    text: Council fires exactly every 5 edits (no missed, no spurious)
  - id: SM-5
    text: mini-council fires 100% non-whitelist edits, fail-open < 1%
  - id: SM-6
    text: live validation: 1 real session, 5 varied prompts → 5 correct phase assignments
  - id: SM-7
    text: HARNESS_AUTO_TRIGGER=0 disables all 4 features (integration test)
